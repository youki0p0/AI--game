<!DOCTYPE html>
<html lang="ja"><head><meta charset="utf-8"><title>Kagura Makina Overlay</title>
<style>
  html,body{margin:0;height:100%;background:transparent;overflow:hidden;}
  #stage{position:fixed;inset:0;pointer-events:none;}
  #sprite{position:absolute;left:0;bottom:var(--floor,6px);
          width:var(--bw,117px);height:var(--bh,197px);transform-origin:bottom center;}
  #char{position:absolute;inset:0;}
  #char img,#char .wing{position:absolute;image-rendering:pixelated;image-rendering:crisp-edges;}
  #body{width:var(--bw,117px);left:0;bottom:0;z-index:2;filter:drop-shadow(0 3px 3px rgba(0,0,0,.3));}
  .wing{width:var(--wingW,128px);height:auto;left:var(--wingX,-66px);top:var(--wingY,-18px);
        transform-origin:var(--pvx,90%) var(--pvy,84%);}
  #wingBack{z-index:1;filter:brightness(.5) saturate(.85);}
  #wingFront{z-index:3;filter:drop-shadow(0 0 2px rgba(110,80,0,.45));}
  #shadow{position:absolute;left:50%;bottom:-5px;width:var(--shW,76px);height:16px;
          transform:translateX(-50%) scaleX(var(--shS,1));opacity:var(--shO,.4);
          background:radial-gradient(ellipse at center,rgba(0,0,0,.55) 0%,rgba(0,0,0,0) 70%);z-index:0;}
</style></head>
<body>
<div id="stage"><div id="sprite">
  <div id="shadow"></div>
  <div id="char">
    <img id="wingBack" class="wing" alt="">
    <img id="body" alt="">
    <img id="wingFront" class="wing" alt="">
  </div>
</div></div>

const bodyEl=document.getElementById("body");
document.getElementById("wingFront").src=WING;
document.getElementById("wingBack").src=WING;
bodyEl.src=BODY[0];
BODY.forEach(s=>{const i=new Image();i.src=s;});

const CFG={ speed:230, margin:12, runFlapHz:2.4, airFlapHz:5.0,
  flapBase:-6, flapAmp:28, backLag:0.06, jumpH:225, gravUp:0.55, gravDn:0.5,
  runTime:2.8, hoverTime:1.4, runBob:4, stepFps:8 };
const RUN_ORDER=[0,1,2,1];   // 走りサイクル

const sprite=document.getElementById("sprite"), charEl=document.getElementById("char");
const wF=document.getElementById("wingFront"), wB=document.getElementById("wingBack");
let S={x:CFG.margin,dir:1,lift:0,vy:0,phase:"run",phaseT:0,runDist:0};
const SW=()=>sprite.getBoundingClientRect().width||117;
function clampX(){const m=window.innerWidth-SW()-CFG.margin; if(S.x>m)S.x=m; if(S.x<CFG.margin)S.x=CFG.margin;}
function advance(dt){ S.phaseT+=dt;
  if(S.phase==="run"){ const dx=S.dir*CFG.speed*dt; S.x+=dx; S.runDist+=Math.abs(dx);
    const m=window.innerWidth-SW()-CFG.margin; if(S.x>=m){S.x=m;S.dir=-1;} if(S.x<=CFG.margin){S.x=CFG.margin;S.dir=1;}
    if(S.phaseT>=CFG.runTime){S.phase="jump";S.phaseT=0;S.vy=Math.sqrt(2*CFG.gravUp*CFG.jumpH);}
  }else if(S.phase==="jump"){ S.x+=S.dir*CFG.speed*0.6*dt; S.lift+=S.vy; S.vy-=CFG.gravUp*60*dt;
    if(S.vy<=0){S.phase="hover";S.phaseT=0;} clampX();
  }else if(S.phase==="hover"){ S.x+=S.dir*CFG.speed*0.45*dt; S.lift+=Math.sin(S.phaseT*Math.PI*2*1.1)*0.8; clampX();
    if(S.phaseT>=CFG.hoverTime){S.phase="fall";S.phaseT=0;S.vy=0;}
  }else if(S.phase==="fall"){ S.x+=S.dir*CFG.speed*0.6*dt; S.vy+=CFG.gravDn*60*dt; S.lift-=S.vy; clampX();
    if(S.lift<=0){S.lift=0;S.phase="run";S.phaseT=0;} } }
function flap(el,sec,hz,lag){ const s=Math.sin((sec-lag)*Math.PI*2*hz);
  el.style.transform=`rotate(${CFG.flapBase+CFG.flapAmp*s}deg) scaleY(${1-0.16*Math.max(0,s)})`; }
let curFrame=-1;
function paint(sec){
  const inAir=S.phase!=="run", hz=inAir?CFG.airFlapHz:CFG.runFlapHz;
  flap(wF,sec,hz,0); flap(wB,sec,hz,CFG.backLag);
  // 本体: 走行は3コマ切替, 空中は passing(1)
  let fi;
  if(inAir){ fi=1; }
  else { const idx=Math.floor(S.runDist/(CFG.speed/CFG.stepFps))%RUN_ORDER.length; fi=RUN_ORDER[idx]; }
  if(fi!==curFrame){ bodyEl.src=BODY[fi]; curFrame=fi; }
  const bob=inAir?0:Math.abs(Math.sin(sec*Math.PI*CFG.runFlapHz*2))*CFG.runBob;
  charEl.style.transform=`translateY(${-(S.lift+bob)}px)`;
  const k=Math.min(1,S.lift/CFG.jumpH);
  sprite.style.setProperty("--shS",(1-0.55*k).toFixed(3));
  sprite.style.setProperty("--shO",(0.4*(1-0.7*k)).toFixed(3));
  sprite.style.left=S.x+"px"; sprite.style.transform=`scaleX(${S.dir===1?1:-1})`;
}
const q=new URLSearchParams(location.search);
if(q.has("t")){ const target=parseFloat(q.get("t")),dt=1/60;
  for(let e=0;e<target-1e-9;e+=dt) advance(Math.min(dt,target-e)); paint(target);
}else{ let last=null; (function loop(t){ if(last===null)last=t; const dt=Math.min(0.05,(t-last)/1000); last=t;
  advance(dt); paint(t/1000); requestAnimationFrame(loop); })(performance.now()); }
</script></body></html>
