const CFG={ size:222, speed:240, margin:12, runFlapHz:2.6, airFlapHz:5.2,

const sprite=document.getElementById("sprite"), wing=document.getElementById("wing");
sprite.style.setProperty("--h",CFG.size+"px");
let S={x:CFG.margin,dir:1,lift:0,vy:0,phase:"run",phaseT:0};
const SW=()=>sprite.getBoundingClientRect().width||130;
function clampX(){const m=window.innerWidth-SW()-CFG.margin; if(S.x>m)S.x=m; if(S.x<CFG.margin)S.x=CFG.margin;}
function advance(dt){ S.phaseT+=dt;
  if(S.phase==="run"){ S.x+=S.dir*CFG.speed*dt; const m=window.innerWidth-SW()-CFG.margin;
    if(S.x>=m){S.x=m;S.dir=-1;} if(S.x<=CFG.margin){S.x=CFG.margin;S.dir=1;}
    if(S.phaseT>=CFG.runTime){S.phase="jump";S.phaseT=0;S.vy=Math.sqrt(2*CFG.gravUp*CFG.jumpH);}
  }else if(S.phase==="jump"){ S.x+=S.dir*CFG.speed*0.6*dt; S.lift+=S.vy; S.vy-=CFG.gravUp*60*dt;
    if(S.vy<=0){S.phase="hover";S.phaseT=0;} clampX();
  }else if(S.phase==="hover"){ S.x+=S.dir*CFG.speed*0.45*dt; S.lift+=Math.sin(S.phaseT*Math.PI*2*1.1)*0.8; clampX();
    if(S.phaseT>=CFG.hoverTime){S.phase="fall";S.phaseT=0;S.vy=0;}
  }else if(S.phase==="fall"){ S.x+=S.dir*CFG.speed*0.6*dt; S.vy+=CFG.gravDn*60*dt; S.lift-=S.vy; clampX();
    if(S.lift<=0){S.lift=0;S.phase="run";S.phaseT=0;} } }
function paint(sec){
  const inAir=S.phase!=="run", hz=inAir?CFG.airFlapHz:CFG.runFlapHz;
  const s=Math.sin(sec*Math.PI*2*hz);
  wing.style.transform=`rotate(${CFG.flapBase+CFG.flapAmp*s}deg) scaleY(${1-0.16*Math.max(0,s)})`;
  const bob=inAir?0:Math.abs(Math.sin(sec*Math.PI*CFG.runFlapHz*2))*7;
  document.getElementById("body").style.transform=`translateY(${-bob}px)`;
  sprite.style.left=S.x+"px"; sprite.style.bottom=(CFG.margin+S.lift)+"px";
  sprite.style.transform=`scaleX(${S.dir===1?1:-1})`;
}
const q=new URLSearchParams(location.search);
if(q.has("t")){ const target=parseFloat(q.get("t")),dt=1/60;
  for(let e=0;e<target-1e-9;e+=dt) advance(Math.min(dt,target-e)); paint(target);
}else{ let last=null; (function loop(t){ if(last===null)last=t; const dt=Math.min(0.05,(t-last)/1000); last=t;
  advance(dt); paint(t/1000); requestAnimationFrame(loop); })(performance.now()); }
</script></body></html>
